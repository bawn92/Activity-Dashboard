name = "fitness-render-worker"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Public base URL the Worker uses to rewrite `videoUrl` returned to clients.
# Override per-environment by setting the secret instead of editing this file.
[vars]
PUBLIC_BASE_URL = "https://example.replit.app"
RENDER_BACKEND_URL = "https://example.replit.app"

# KV namespace that mirrors render-job status from the backend so polling
# requests can be served from the edge. Provision with:
#   wrangler kv:namespace create RENDER_STATUS
# then paste the returned `id` below.
[[kv_namespaces]]
binding = "RENDER_STATUS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Optional: pin the Worker to a route on your zone.
# [[routes]]
# pattern = "render.example.com/*"
# zone_name = "example.com"
