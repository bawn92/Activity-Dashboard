openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Fitness Activity Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: activities
    description: Fitness activity operations
  - name: storage
    description: Object storage operations
  - name: render
    description: Video render job operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List all activities
      description: Returns a list of all parsed fitness activities ordered by start time descending
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivitySummary"

  /activities/upload:
    post:
      operationId: uploadActivity
      tags: [activities]
      summary: Upload a .fit file
      description: Upload a Garmin .fit file for parsing and storage. Send as multipart/form-data with a field named 'file'.
      responses:
        "201":
          description: Activity parsed and stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityDetail"
        "400":
          description: Invalid or malformed .fit file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: FIT file parsed but no useful data found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/upload-batch:
    post:
      operationId: uploadActivityBatch
      tags: [activities]
      summary: Upload a batch of .fit or .fit.gz files
      description: |
        Upload up to 10 Garmin .fit or .fit.gz files in one multipart/form-data
        request under the field name 'files'. The server processes them
        sequentially, decompresses gzip as needed, dedupes by SHA-256 of the
        decompressed bytes, and returns per-file results plus aggregate counts.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  description: Up to 10 .fit or .fit.gz files
                  minItems: 1
                  maxItems: 10
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: Per-file results plus aggregate counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadActivityBatchResponse"
        "400":
          description: No files provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/stats:
    get:
      operationId: getActivityStats
      tags: [activities]
      summary: Aggregate stats across all activities
      description: Returns totals and averages across all activities for a dashboard overview
      responses:
        "200":
          description: Aggregate statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityStats"

  /activities/stats/sport:
    get:
      operationId: getSportStats
      tags: [activities]
      summary: All-time and recent stats for a specific sport
      description: Returns last-4-weeks aggregates, all-time totals, and best efforts for the given sport
      parameters:
        - name: sport
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Sport statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SportStats"
        "400":
          description: Missing or invalid sport parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/{id}:
    get:
      operationId: getActivity
      tags: [activities]
      summary: Get activity detail
      description: Returns full activity detail including summary and time-series data points
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityDetail"
        "404":
          description: Activity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateActivity
      tags: [activities]
      summary: Update activity metadata
      description: Update editable metadata fields (sport, name, notes) for an activity. Requires authentication.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActivityBody"
      responses:
        "200":
          description: Updated activity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityDetail"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized – user is not signed in or not on the allowlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Activity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteActivity
      tags: [activities]
      summary: Delete an activity
      description: Delete an activity and its associated data points
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Activity deleted
        "404":
          description: Activity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/{id}/render-video:
    post:
      operationId: createRenderJob
      tags: [render]
      summary: Start a video render job for an activity
      description: Creates a render job and enqueues an in-process Remotion render. Returns immediately with the new job's status.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRenderJobBody"
      responses:
        "201":
          description: Job created and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderJob"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Activity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/{id}/render-jobs:
    get:
      operationId: listActivityRenderJobs
      tags: [render]
      summary: List render jobs for an activity
      description: Returns render jobs for the given activity, newest first.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of render jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RenderJob"

  /render-jobs/{jobId}:
    get:
      operationId: getRenderJob
      tags: [render]
      summary: Get a render job by ID
      description: Returns the current state of a render job, including the video URL when complete.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Render job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderJob"
        "404":
          description: Render job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      description: Returns a presigned URL for direct file upload to object storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageUploadRequestBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageUploadPresignedUrl"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UpdateActivityBody:
      type: object
      description: Fields that can be updated on an activity
      properties:
        sport:
          type: string
        name:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        excludedFromStats:
          type: boolean

    ActivitySummary:
      type: object
      properties:
        id:
          type: integer
        sport:
          type: string
        name:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        startTime:
          type: string
          format: date-time
        durationSeconds:
          type: ["number", "null"]
        distanceMeters:
          type: ["number", "null"]
        avgSpeedMps:
          type: ["number", "null"]
        avgPaceSecPerKm:
          type: ["number", "null"]
        totalElevGainMeters:
          type: ["number", "null"]
        totalElevDescMeters:
          type: ["number", "null"]
        maxSpeedMps:
          type: ["number", "null"]
        avgHeartRate:
          type: ["number", "null"]
        maxHeartRate:
          type: ["number", "null"]
        totalCalories:
          type: ["number", "null"]
        avgCadence:
          type: ["number", "null"]
        avgPower:
          type: ["number", "null"]
        normalizedPower:
          type: ["number", "null"]
        avgVerticalOscillationMm:
          type: ["number", "null"]
        avgStanceTimeMs:
          type: ["number", "null"]
        avgVerticalRatio:
          type: ["number", "null"]
        avgStepLengthMm:
          type: ["number", "null"]
        excludedFromStats:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sport
        - startTime
        - durationSeconds
        - distanceMeters
        - avgSpeedMps
        - avgPaceSecPerKm
        - totalElevGainMeters
        - totalElevDescMeters
        - maxSpeedMps
        - avgHeartRate
        - maxHeartRate
        - totalCalories
        - avgCadence
        - avgPower
        - normalizedPower
        - avgVerticalOscillationMm
        - avgStanceTimeMs
        - avgVerticalRatio
        - avgStepLengthMm
        - excludedFromStats
        - createdAt

    DataPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        heartRate:
          type: ["number", "null"]
        cadence:
          type: ["number", "null"]
        altitude:
          type: ["number", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        speed:
          type: ["number", "null"]
        distance:
          type: ["number", "null"]
        power:
          type: ["number", "null"]
      required:
        - timestamp
        - heartRate
        - cadence
        - altitude
        - lat
        - lng
        - speed
        - distance
        - power

    ActivityDetail:
      type: object
      properties:
        id:
          type: integer
        sport:
          type: string
        name:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        startTime:
          type: string
          format: date-time
        durationSeconds:
          type: ["number", "null"]
        distanceMeters:
          type: ["number", "null"]
        avgSpeedMps:
          type: ["number", "null"]
        avgPaceSecPerKm:
          type: ["number", "null"]
        totalElevGainMeters:
          type: ["number", "null"]
        totalElevDescMeters:
          type: ["number", "null"]
        maxSpeedMps:
          type: ["number", "null"]
        avgHeartRate:
          type: ["number", "null"]
        maxHeartRate:
          type: ["number", "null"]
        totalCalories:
          type: ["number", "null"]
        avgCadence:
          type: ["number", "null"]
        avgPower:
          type: ["number", "null"]
        normalizedPower:
          type: ["number", "null"]
        avgVerticalOscillationMm:
          type: ["number", "null"]
        avgStanceTimeMs:
          type: ["number", "null"]
        avgVerticalRatio:
          type: ["number", "null"]
        avgStepLengthMm:
          type: ["number", "null"]
        fileObjectPath:
          type: ["string", "null"]
        excludedFromStats:
          type: boolean
        createdAt:
          type: string
          format: date-time
        dataPoints:
          type: array
          items:
            $ref: "#/components/schemas/DataPoint"
      required:
        - id
        - sport
        - startTime
        - durationSeconds
        - distanceMeters
        - avgSpeedMps
        - avgPaceSecPerKm
        - totalElevGainMeters
        - totalElevDescMeters
        - maxSpeedMps
        - avgHeartRate
        - maxHeartRate
        - totalCalories
        - avgCadence
        - avgPower
        - normalizedPower
        - avgVerticalOscillationMm
        - avgStanceTimeMs
        - avgVerticalRatio
        - avgStepLengthMm
        - fileObjectPath
        - excludedFromStats
        - createdAt
        - dataPoints

    ActivityStats:
      type: object
      properties:
        totalActivities:
          type: integer
        totalDistanceMeters:
          type: number
        totalDurationSeconds:
          type: number
        avgDistanceMeters:
          type: number
        avgDurationSeconds:
          type: number
        sportBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/SportCount"
      required:
        - totalActivities
        - totalDistanceMeters
        - totalDurationSeconds
        - avgDistanceMeters
        - avgDurationSeconds
        - sportBreakdown

    BestEffort:
      type: object
      properties:
        distanceMeters:
          type: number
        label:
          type: string
        durationSeconds:
          type: ["number", "null"]
        activityId:
          type: ["integer", "null"]
      required:
        - distanceMeters
        - label
        - durationSeconds
        - activityId

    SportPeriodStats:
      type: object
      properties:
        activityCount:
          type: integer
        totalDistanceMeters:
          type: number
        totalDurationSeconds:
          type: number
        totalElevGainMeters:
          type: number
      required:
        - activityCount
        - totalDistanceMeters
        - totalDurationSeconds
        - totalElevGainMeters

    SportStats:
      type: object
      properties:
        sport:
          type: string
        last4Weeks:
          $ref: "#/components/schemas/SportPeriodStats"
        allTime:
          $ref: "#/components/schemas/SportPeriodStats"
        bestEfforts:
          type: array
          items:
            $ref: "#/components/schemas/BestEffort"
      required:
        - sport
        - last4Weeks
        - allTime
        - bestEfforts

    SportCount:
      type: object
      properties:
        sport:
          type: string
        count:
          type: integer
      required:
        - sport
        - count

    UploadActivityBatchItem:
      type: object
      properties:
        filename:
          type: string
        status:
          type: string
          enum: [created, duplicate, failed]
        activityId:
          type: ["integer", "null"]
        error:
          type: ["string", "null"]
      required:
        - filename
        - status

    UploadActivityBatchResponse:
      type: object
      properties:
        success:
          type: integer
        duplicate:
          type: integer
        failed:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/UploadActivityBatchItem"
      required:
        - success
        - duplicate
        - failed
        - results

    StorageUploadRequestBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType

    RenderJob:
      type: object
      properties:
        id:
          type: integer
        activityId:
          type: integer
        status:
          type: string
          enum: [queued, rendering, complete, failed]
        progress:
          type: number
        videoObjectPath:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        style:
          type: string
          enum: [cinematic, map]
        centerLat:
          type: ["number", "null"]
        centerLng:
          type: ["number", "null"]
        zoom:
          type: ["number", "null"]
        bearing:
          type: ["number", "null"]
        pitch:
          type: ["number", "null"]
        cameraMode:
          type: string
          enum: [static, follow]
          description: Map camera behaviour during the render. "static" keeps the framed camera locked; "follow" pans/zooms each frame to track the moving runner marker.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - activityId
        - status
        - progress
        - videoObjectPath
        - videoUrl
        - errorMessage
        - style
        - centerLat
        - centerLng
        - zoom
        - bearing
        - pitch
        - cameraMode
        - createdAt
        - updatedAt

    CreateRenderJobBody:
      type: object
      description: Optional render-job parameters. When omitted, defaults to a "cinematic" render with no camera params.
      properties:
        style:
          type: string
          enum: [cinematic, map]
          description: Which composition to render. Defaults to "cinematic".
        centerLat:
          type: number
          description: Map camera center latitude (only used when style = "map").
        centerLng:
          type: number
          description: Map camera center longitude (only used when style = "map").
        zoom:
          type: number
          description: Map camera zoom level (only used when style = "map").
        bearing:
          type: number
          description: Map camera bearing in degrees (only used when style = "map").
        pitch:
          type: number
          description: Map camera pitch in degrees, 0–85 (only used when style = "map").
        cameraMode:
          type: string
          enum: [static, follow]
          description: Camera behaviour during the map render. "static" (default) keeps the framed camera locked; "follow" pans/zooms each frame to keep the moving runner marker centered.

    StorageUploadPresignedUrl:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
      required:
        - uploadURL
        - objectPath
