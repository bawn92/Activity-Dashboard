openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Fitness Activity Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: activities
    description: Fitness activity operations
  - name: storage
    description: Object storage operations
  - name: render
    description: Video render job operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List all activities
      description: Returns a list of all parsed fitness activities ordered by start time descending
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivitySummary"

  /activities/upload:
    post:
      operationId: uploadActivity
      tags: [activities]
      summary: Upload a .fit file
      description: Upload a Garmin .fit file for parsing and storage. Send as multipart/form-data with a field named 'file'.
      responses:
        "201":
          description: Activity parsed and stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityDetail"
        "400":
          description: Invalid or malformed .fit file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: FIT file parsed but no useful data found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/stats:
    get:
      operationId: getActivityStats
      tags: [activities]
      summary: Aggregate stats across all activities
      description: Returns totals and averages across all activities for a dashboard overview
      responses:
        "200":
          description: Aggregate statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityStats"

  /activities/{id}:
    get:
      operationId: getActivity
      tags: [activities]
      summary: Get activity detail
      description: Returns full activity detail including summary and time-series data points
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityDetail"
        "404":
          description: Activity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteActivity
      tags: [activities]
      summary: Delete an activity
      description: Delete an activity and its associated data points
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Activity deleted
        "404":
          description: Activity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/{id}/render-video:
    post:
      operationId: createRenderJob
      tags: [render]
      summary: Start a video render job for an activity
      description: Creates a render job and enqueues an in-process Remotion render. Returns immediately with the new job's status.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Job created and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderJob"
        "404":
          description: Activity not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /activities/{id}/render-jobs:
    get:
      operationId: listActivityRenderJobs
      tags: [render]
      summary: List render jobs for an activity
      description: Returns render jobs for the given activity, newest first.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of render jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RenderJob"

  /render-jobs/{jobId}:
    get:
      operationId: getRenderJob
      tags: [render]
      summary: Get a render job by ID
      description: Returns the current state of a render job, including the video URL when complete.
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Render job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RenderJob"
        "404":
          description: Render job not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL
      description: Returns a presigned URL for direct file upload to object storage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StorageUploadRequestBody"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorageUploadPresignedUrl"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    ActivitySummary:
      type: object
      properties:
        id:
          type: integer
        sport:
          type: string
        startTime:
          type: string
          format: date-time
        durationSeconds:
          type: ["number", "null"]
        distanceMeters:
          type: ["number", "null"]
        avgSpeedMps:
          type: ["number", "null"]
        avgPaceSecPerKm:
          type: ["number", "null"]
        totalElevGainMeters:
          type: ["number", "null"]
        totalElevDescMeters:
          type: ["number", "null"]
        maxSpeedMps:
          type: ["number", "null"]
        avgHeartRate:
          type: ["number", "null"]
        maxHeartRate:
          type: ["number", "null"]
        totalCalories:
          type: ["number", "null"]
        avgCadence:
          type: ["number", "null"]
        avgPower:
          type: ["number", "null"]
        normalizedPower:
          type: ["number", "null"]
        avgVerticalOscillationMm:
          type: ["number", "null"]
        avgStanceTimeMs:
          type: ["number", "null"]
        avgVerticalRatio:
          type: ["number", "null"]
        avgStepLengthMm:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - sport
        - startTime
        - durationSeconds
        - distanceMeters
        - avgSpeedMps
        - avgPaceSecPerKm
        - totalElevGainMeters
        - totalElevDescMeters
        - maxSpeedMps
        - avgHeartRate
        - maxHeartRate
        - totalCalories
        - avgCadence
        - avgPower
        - normalizedPower
        - avgVerticalOscillationMm
        - avgStanceTimeMs
        - avgVerticalRatio
        - avgStepLengthMm
        - createdAt

    DataPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        heartRate:
          type: ["number", "null"]
        cadence:
          type: ["number", "null"]
        altitude:
          type: ["number", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        speed:
          type: ["number", "null"]
        distance:
          type: ["number", "null"]
        power:
          type: ["number", "null"]
      required:
        - timestamp
        - heartRate
        - cadence
        - altitude
        - lat
        - lng
        - speed
        - distance
        - power

    ActivityDetail:
      type: object
      properties:
        id:
          type: integer
        sport:
          type: string
        startTime:
          type: string
          format: date-time
        durationSeconds:
          type: ["number", "null"]
        distanceMeters:
          type: ["number", "null"]
        avgSpeedMps:
          type: ["number", "null"]
        avgPaceSecPerKm:
          type: ["number", "null"]
        totalElevGainMeters:
          type: ["number", "null"]
        totalElevDescMeters:
          type: ["number", "null"]
        maxSpeedMps:
          type: ["number", "null"]
        avgHeartRate:
          type: ["number", "null"]
        maxHeartRate:
          type: ["number", "null"]
        totalCalories:
          type: ["number", "null"]
        avgCadence:
          type: ["number", "null"]
        avgPower:
          type: ["number", "null"]
        normalizedPower:
          type: ["number", "null"]
        avgVerticalOscillationMm:
          type: ["number", "null"]
        avgStanceTimeMs:
          type: ["number", "null"]
        avgVerticalRatio:
          type: ["number", "null"]
        avgStepLengthMm:
          type: ["number", "null"]
        fileObjectPath:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        dataPoints:
          type: array
          items:
            $ref: "#/components/schemas/DataPoint"
      required:
        - id
        - sport
        - startTime
        - durationSeconds
        - distanceMeters
        - avgSpeedMps
        - avgPaceSecPerKm
        - totalElevGainMeters
        - totalElevDescMeters
        - maxSpeedMps
        - avgHeartRate
        - maxHeartRate
        - totalCalories
        - avgCadence
        - avgPower
        - normalizedPower
        - avgVerticalOscillationMm
        - avgStanceTimeMs
        - avgVerticalRatio
        - avgStepLengthMm
        - fileObjectPath
        - createdAt
        - dataPoints

    ActivityStats:
      type: object
      properties:
        totalActivities:
          type: integer
        totalDistanceMeters:
          type: number
        totalDurationSeconds:
          type: number
        avgDistanceMeters:
          type: number
        avgDurationSeconds:
          type: number
        sportBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/SportCount"
      required:
        - totalActivities
        - totalDistanceMeters
        - totalDurationSeconds
        - avgDistanceMeters
        - avgDurationSeconds
        - sportBreakdown

    SportCount:
      type: object
      properties:
        sport:
          type: string
        count:
          type: integer
      required:
        - sport
        - count

    StorageUploadRequestBody:
      type: object
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
      required:
        - name
        - size
        - contentType

    RenderJob:
      type: object
      properties:
        id:
          type: integer
        activityId:
          type: integer
        status:
          type: string
          enum: [queued, rendering, complete, failed]
        progress:
          type: number
        videoObjectPath:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - activityId
        - status
        - progress
        - videoObjectPath
        - videoUrl
        - errorMessage
        - createdAt
        - updatedAt

    StorageUploadPresignedUrl:
      type: object
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
      required:
        - uploadURL
        - objectPath
